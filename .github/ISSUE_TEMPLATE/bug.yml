name: Bug report
description: Report a reproducible product, import, accessibility or rendering problem.
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Nova Music Lab. Never attach raw listening exports, API keys, email addresses, IP data or private CV files. Use a minimal synthetic fixture when data is necessary.

  - type: dropdown
    id: mode
    attributes:
      label: Museum mode
      options:
        - Flagship exhibition
        - Visitor import
        - Both
        - Unsure
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Import and parsing
        - Storage and restore
        - Analytics and provenance
        - Visuals and motion
        - Accessibility and keyboard
        - Language or RTL
        - PWA or offline behavior
        - Deployment or documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Privacy-safe reproduction
      description: Provide exact steps without including personal listening data.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser, OS and viewport
      placeholder: Chrome 140 / Windows 11 / 1440x900
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Interface language
      options: [English, Español, עברית, Multiple]
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed personal listening data, API keys and private files from this report.
          required: true
