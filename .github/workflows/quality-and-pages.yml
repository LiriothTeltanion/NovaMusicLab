name: Quality and Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-pages-${{ github.ref }}
  # A newer main push must supersede any stale verification or Pages deploy.
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      release_version: ${{ steps.artifact_identity.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify code, data, tests and bundle budgets
        run: npm run verify

      - name: Audit the public flagship privacy boundary
        run: node scripts/audit_public_bundle_privacy.mjs

      - name: Stamp verified artifact identity
        id: artifact_identity
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          BUILD_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          node -e "const fs = require('node:fs'); const pkg = require('./package.json'); fs.writeFileSync('dist/build-meta.json', JSON.stringify({ commit: process.env.BUILD_COMMIT, version: pkg.version }) + '\n')"

      - name: Upload verified Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
          retention-days: 1

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy verified artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  smoke:
    name: Smoke test Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [verify, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      PAGE_URL: ${{ needs.deploy.outputs.page_url }}
      EXPECTED_COMMIT: ${{ github.sha }}
      EXPECTED_VERSION: ${{ needs.verify.outputs.release_version }}
    steps:
      - name: Verify the deployed museum
        shell: bash
        run: |
          for attempt in {1..12}; do
            cache_bust="commit=$EXPECTED_COMMIT&attempt=$attempt"
            page_status="$(curl --silent --show-error --location --header 'Cache-Control: no-cache' --output /tmp/nova-music-lab.html --write-out '%{http_code}' "${PAGE_URL%/}/?$cache_bust" || true)"
            meta_status="$(curl --silent --show-error --location --header 'Cache-Control: no-cache' --output /tmp/nova-build-meta.json --write-out '%{http_code}' "${PAGE_URL%/}/build-meta.json?$cache_bust" || true)"
            if [[ "$page_status" == "200" ]] \
              && [[ "$meta_status" == "200" ]] \
              && grep --quiet "Nova Music Lab" /tmp/nova-music-lab.html \
              && node -e "const fs = require('node:fs'); const meta = JSON.parse(fs.readFileSync('/tmp/nova-build-meta.json', 'utf8')); process.exit(meta.commit === process.env.EXPECTED_COMMIT && meta.version === process.env.EXPECTED_VERSION ? 0 : 1)"; then
              echo "Pages smoke test passed for $EXPECTED_COMMIT (v$EXPECTED_VERSION) at $PAGE_URL"
              exit 0
            fi
            echo "Attempt $attempt/12 returned page=$page_status meta=$meta_status without the expected artifact identity; retrying in 5 seconds"
            sleep 5
          done

          echo "Pages smoke test failed: $PAGE_URL did not serve $EXPECTED_COMMIT (v$EXPECTED_VERSION)"
          exit 1
