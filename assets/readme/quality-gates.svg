<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="330" viewBox="0 0 1400 330" role="img" aria-labelledby="title desc">
<title id="title">Nova Music Lab quality gates</title>
<desc id="desc">A static verification pipeline from lint through deployment.</desc>
<defs><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#818cf8"/><stop offset="100%" stop-color="#4ade80"/></linearGradient></defs>
<rect width="1400" height="330" rx="28" fill="#081120"/>
<text x="700" y="52" text-anchor="middle" fill="#e0f2fe" font-family="Segoe UI,Arial" font-size="25" font-weight="850">ONE COMMAND • SIX QUALITY GATES • ZERO UNVERIFIED DEPLOYS</text>
<path d="M105 177H1295" stroke="#172554" stroke-width="18" stroke-linecap="round"/>
<path d="M105 177H1295" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 15"/>
<g font-family="Segoe UI,Arial" text-anchor="middle" font-weight="800">
<g transform="translate(120 177)"><circle r="53" fill="#12344a" stroke="#22d3ee"/><text y="6" fill="#cffafe" font-size="17">LINT</text></g>
<g transform="translate(350 177)"><circle r="53" fill="#1d315c" stroke="#60a5fa"/><text y="-4" fill="#dbeafe" font-size="16">DATA</text><text y="18" fill="#bfdbfe" font-size="12">STRICT</text></g>
<g transform="translate(580 177)"><circle r="53" fill="#30265e" stroke="#a78bfa"/><text y="-4" fill="#ede9fe" font-size="16">MEDIA</text><text y="18" fill="#ddd6fe" font-size="12">LINKS</text></g>
<g transform="translate(810 177)"><circle r="53" fill="#40244d" stroke="#f0abfc"/><text y="6" fill="#fae8ff" font-size="17">TESTS</text></g>
<g transform="translate(1040 177)"><circle r="53" fill="#3e2931" stroke="#fb7185"/><text y="-4" fill="#ffe4e6" font-size="16">BUILD</text><text y="18" fill="#fecdd3" font-size="12">BUDGET</text></g>
<g transform="translate(1280 177)"><circle r="58" fill="#153b2c" stroke="#4ade80" stroke-width="3"/><text y="6" fill="#dcfce7" font-size="17">DEPLOY</text></g>
</g>
<text x="700" y="292" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="16">npm run verify protects data quality, tests, performance, and the GitHub Pages artifact.</text>
</svg>
