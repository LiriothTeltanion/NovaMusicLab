<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
<title id="title">Nova Music Lab privacy pulse</title><desc id="desc">Raw files remain protected in the local browser.</desc>
<defs><linearGradient id="shield" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>
<rect width="1200" height="300" rx="26" fill="#081120"/><g transform="translate(205 150)"><path d="M0-92 77-60v61c0 54-34 93-77 111C-43 94-77 55-77 1v-61Z" fill="url(#shield)" stroke="#cffafe" stroke-opacity=".55" stroke-width="2"/><path d="m-28 4 20 20 42-50" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/></g>
<g font-family="Segoe UI,Arial"><text x="365" y="80" fill="#e0f2fe" font-size="28" font-weight="900">LOCAL-FIRST BY DESIGN</text><text x="365" y="124" fill="#bae6fd" font-size="19">Raw listening exports are parsed inside the browser.</text><text x="365" y="158" fill="#cbd5e1" font-size="17">• No backend database stores the uploaded archive.</text><text x="365" y="188" fill="#cbd5e1" font-size="17">• Sensitive Spotify fields are not retained.</text><text x="365" y="218" fill="#cbd5e1" font-size="17">• Gemini is optional and receives aggregate insights, not raw files.</text><text x="365" y="254" fill="#67e8f9" font-size="16" font-weight="700">YOUR ARCHIVE • YOUR DEVICE • YOUR DECISION</text></g>
</svg>
