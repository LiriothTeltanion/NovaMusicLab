<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="460" viewBox="0 0 1500 460" role="img" aria-labelledby="title description">
  <title id="title">Nova Music Lab — Living Sonic Cartography</title>
  <desc id="description">Static, motion-safe banner for the local-first digital museum of listening history.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#030611"/><stop offset=".52" stop-color="#080d25"/><stop offset="1" stop-color="#160a28"/></linearGradient>
    <linearGradient id="nova" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2de2e6"/><stop offset=".52" stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/></linearGradient>
    <radialGradient id="aura"><stop stop-color="#2de2e6" stop-opacity=".25"/><stop offset="1" stop-color="#2de2e6" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#9feff2" stroke-opacity=".055"/></pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1500" height="460" rx="30" fill="url(#bg)"/><rect width="1500" height="460" rx="30" fill="url(#grid)"/>
  <circle cx="1220" cy="160" r="390" fill="url(#aura)"/>
  <path d="M0 365c135-65 212 68 339 5s236-54 351-5 225 56 350-11 255-46 460 8" fill="none" stroke="#2de2e6" stroke-opacity=".24" stroke-width="3"/>
  <path d="M0 393c134 43 214-55 343-3s230 43 352-9 236-35 355 6 256 26 450-16" fill="none" stroke="#ec4899" stroke-opacity=".18" stroke-width="2" stroke-dasharray="8 13"/>

  <g transform="translate(92 78)" filter="url(#glow)">
    <path d="M74 4A69 69 0 1 0 134 109" fill="none" stroke="url(#nova)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="135" cy="109" r="6" fill="#f6b73c"/>
    <path d="M38 101V41l73 69V43" fill="none" stroke="#f8fbff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M25 76h19l8-18 10 34 12-27 10 14 11-9 13 6h26" fill="none" stroke="#2de2e6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="267" y="105" fill="#80f4f5" font-size="18" font-weight="750" letter-spacing="5">LIVING SONIC CARTOGRAPHY ✦</text>
    <text x="258" y="202" fill="#f8fbff" font-size="84" font-weight="900" letter-spacing="-3">NOVA MUSIC LAB</text>
    <text x="263" y="249" fill="#cbd5e1" font-size="25">Your listening history as a living, evidence-linked digital museum.</text>
    <text x="263" y="291" fill="#8ea0b8" font-size="18">LOCAL-FIRST · ARTIST INTELLIGENCE · GENERATIVE IDENTITY · EN / ES / HE</text>
  </g>

  <g transform="translate(1225 218)">
    <circle r="142" fill="#060a19" fill-opacity=".75" stroke="url(#nova)" stroke-width="3" stroke-dasharray="3 10"/>
    <circle r="104" fill="none" stroke="#94a3b8" stroke-opacity=".16"/><circle r="62" fill="none" stroke="#94a3b8" stroke-opacity=".16"/>
    <path d="M-122 20c35-4 44-65 82-50s34 74 78 50 56-77 112-50" fill="none" stroke="url(#nova)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <g fill="#2de2e6" stroke="#d9ffff" stroke-width="2"><circle cx="-78" cy="-15" r="5"/><circle cx="-39" cy="-30" r="7"/><circle cx="38" cy="20" r="6"/><circle cx="94" cy="-21" r="7"/></g>
    <circle cx="-15" cy="69" r="5" fill="#ec4899"/><circle cx="61" cy="-61" r="5" fill="#ec4899"/>
  </g>

  <rect x="18" y="18" width="1464" height="424" rx="24" fill="none" stroke="#e2f9ff" stroke-opacity=".14"/>
  <path d="M18 105V46a28 28 0 0 1 28-28h59M1395 442h59a28 28 0 0 0 28-28v-59" fill="none" stroke="url(#nova)" stroke-width="3"/>
</svg>
