<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
<title id="title">Nova Music Lab source constellation</title><desc id="desc">A static constellation of listening sources around a private local browser core.</desc>
<defs><linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="52%" stop-color="#6366f1"/><stop offset="100%" stop-color="#d946ef"/></linearGradient></defs>
<rect width="1280" height="430" rx="28" fill="#081120"/><ellipse cx="640" cy="220" rx="490" ry="154" fill="none" stroke="#67e8f9" stroke-opacity=".22" stroke-width="2" stroke-dasharray="10 15"/><ellipse cx="640" cy="220" rx="350" ry="112" fill="none" stroke="#c084fc" stroke-opacity=".24" stroke-width="2" stroke-dasharray="6 17"/>
<circle cx="640" cy="220" r="92" fill="url(#core)"/>
<g font-family="Segoe UI,Arial" text-anchor="middle"><text x="640" y="205" fill="#fff" font-size="24" font-weight="900">LOCAL BROWSER</text><text x="640" y="235" fill="#ecfeff" font-size="17">PARSE • NORMALIZE • DEDUP</text><text x="640" y="260" fill="#e9d5ff" font-size="14">RAW FILES STAY ON DEVICE</text></g>
<g font-family="Segoe UI,Arial" font-weight="750" text-anchor="middle">
<g><circle cx="145" cy="220" r="57" fill="#3d1118" stroke="#f43f5e"/><text x="145" y="226" fill="#ffe4e6" font-size="17">LAST.FM</text></g>
<g><circle cx="330" cy="80" r="57" fill="#0d3d24" stroke="#4ade80"/><text x="330" y="86" fill="#dcfce7" font-size="17">SPOTIFY</text></g>
<g><circle cx="640" cy="64" r="60" fill="#3b173f" stroke="#f0abfc"/><text x="640" y="70" fill="#fce7f3" font-size="16">APPLE MUSIC</text></g>
<g><circle cx="950" cy="80" r="61" fill="#2e2451" stroke="#a78bfa"/><text x="950" y="86" fill="#ede9fe" font-size="16">LISTENBRAINZ</text></g>
<g><circle cx="1135" cy="220" r="58" fill="#471313" stroke="#fb7185"/><text x="1135" y="226" fill="#ffe4e6" font-size="17">YOUTUBE</text></g>
</g><text x="640" y="390" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="16">Multiple archives become one deduplicated, source-aware listening history.</text>
</svg>
