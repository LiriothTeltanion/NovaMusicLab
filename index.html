<!doctype html>
<html lang="en" dir="ltr" data-language="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply the saved writing direction before styles or React paint. This
         prevents a Hebrew session from briefly rendering in English/LTR. -->
    <script id="nova-language-prepaint">
      (() => {
        try {
          const storedLanguage = localStorage.getItem('nml_lang');
          const language = storedLanguage === 'es' || storedLanguage === 'en' || storedLanguage === 'he'
            ? storedLanguage
            : 'en';
          const root = document.documentElement;
          root.lang = language;
          root.dir = language === 'he' ? 'rtl' : 'ltr';
          root.dataset.language = language;
        } catch {
          // The safe defaults on <html> remain active when storage is blocked.
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00f2fe" />
    <meta name="application-name" content="Nova Music Lab" />
    <meta name="apple-mobile-web-app-title" content="Nova Music Lab" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Nova Music Lab ✧ Your Musical DNA</title>
    <meta name="description" content="An ornamental, statistical and emotional dashboard that explores your Spotify and Last.fm listening history." />
    <!-- One request, three variable families: fewer font round-trips without a
         flash-prone async stylesheet swap. `display=swap` keeps text visible. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Noto+Sans+Hebrew:wght@300..900&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-[#030712] text-gray-100 overflow-x-hidden antialiased selection:bg-[#00f2fe]/30 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
