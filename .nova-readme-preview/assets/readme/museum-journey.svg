<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
<title id="title">Nova Music Lab museum journey</title><desc id="desc">Animated pipeline from upload to report.</desc>
<defs><linearGradient id="track" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#818cf8"/><stop offset="100%" stop-color="#e879f9"/></linearGradient></defs>
<rect width="1400" height="360" rx="28" fill="#081120"/><path d="M100 185H1300" stroke="#172554" stroke-width="16" stroke-linecap="round"/><path d="M100 185H1300" stroke="url(#track)" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 16"><animate attributeName="stroke-dashoffset" values="0;-280" dur="9s" repeatCount="indefinite"/></path>
<text x="700" y="68" text-anchor="middle" fill="#e0f2fe" font-family="Segoe UI,Arial" font-size="24" font-weight="800">THE LISTENING ARCHIVE BECOMES A MUSEUM JOURNEY</text>
<g font-family="Segoe UI,Arial" text-anchor="middle">
<g transform="translate(120 185)"><circle r="56" fill="#0f3047" stroke="#22d3ee"/><text y="-5" fill="#cffafe" font-size="19" font-weight="800">UPLOAD</text><text y="22" fill="#a5f3fc" font-size="13">PRIVATE FILES</text><animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -9;0 0" dur="4.2s" repeatCount="indefinite"/></g>
<g transform="translate(350 185)"><circle r="56" fill="#1d2b5d" stroke="#60a5fa"/><text y="-5" fill="#dbeafe" font-size="18" font-weight="800">NORMALIZE</text><text y="22" fill="#bfdbfe" font-size="13">MERGE + DEDUP</text><animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 10;0 0" dur="4.8s" repeatCount="indefinite"/></g>
<g transform="translate(580 185)"><circle r="56" fill="#31265f" stroke="#a78bfa"/><text y="-5" fill="#ede9fe" font-size="19" font-weight="800">ANALYTICS</text><text y="22" fill="#ddd6fe" font-size="13">ERAS + RECORDS</text><animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -8;0 0" dur="4.5s" repeatCount="indefinite"/></g>
<g transform="translate(810 185)"><circle r="56" fill="#41224d" stroke="#f0abfc"/><text y="-5" fill="#fae8ff" font-size="18" font-weight="800">EMOTIONS</text><text y="22" fill="#f5d0fe" font-size="13">MAP + MOODS</text><animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 9;0 0" dur="5s" repeatCount="indefinite"/></g>
<g transform="translate(1040 185)"><circle r="56" fill="#48202f" stroke="#fb7185"/><text y="-5" fill="#ffe4e6" font-size="18" font-weight="800">IDENTITY</text><text y="22" fill="#fecdd3" font-size="13">ALIAS + COVER</text><animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -10;0 0" dur="4.6s" repeatCount="indefinite"/></g>
<g transform="translate(1280 185)"><circle r="62" fill="#153b3b" stroke="#5eead4" stroke-width="3"><animate attributeName="r" values="57;66;57" dur="4s" repeatCount="indefinite"/></circle><text y="-5" fill="#ccfbf1" font-size="19" font-weight="900">REPORT</text><text y="22" fill="#99f6e4" font-size="13">SHARE + EXPORT</text></g>
</g><text x="700" y="315" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="15">Missing data is labeled as a gap, never invented.</text>
</svg>