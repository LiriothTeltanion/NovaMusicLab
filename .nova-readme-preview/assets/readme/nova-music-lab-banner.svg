<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="460" viewBox="0 0 1500 460" role="img" aria-labelledby="title desc">
<title id="title">Nova Music Lab animated banner</title>
<desc id="desc">Futuristic animated music analytics museum.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#060817"/><stop offset="45%" stop-color="#16255f"/><stop offset="75%" stop-color="#3b1768"/><stop offset="100%" stop-color="#071b34"/><animate attributeName="x1" values="0;1;0" dur="14s" repeatCount="indefinite"/></linearGradient>
<radialGradient id="vinyl"><stop offset="0%" stop-color="#f5d0fe"/><stop offset="7%" stop-color="#d946ef"/><stop offset="10%" stop-color="#0f172a"/><stop offset="100%" stop-color="#020617"/></radialGradient>
<pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#67e8f9" stroke-opacity=".07"/></pattern>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1500" height="460" rx="30" fill="url(#bg)"/><rect width="1500" height="460" rx="30" fill="url(#grid)"/>
<path d="M0 340 C110 245 175 420 285 325 S480 255 585 330 S770 405 885 300 S1085 205 1180 300 S1370 360 1500 255" fill="none" stroke="#67e8f9" stroke-width="5" opacity=".7"><animate attributeName="d" values="M0 340 C110 245 175 420 285 325 S480 255 585 330 S770 405 885 300 S1085 205 1180 300 S1370 360 1500 255;M0 325 C120 415 185 240 300 335 S485 405 600 295 S785 230 900 335 S1095 395 1200 285 S1380 220 1500 330;M0 340 C110 245 175 420 285 325 S480 255 585 330 S770 405 885 300 S1085 205 1180 300 S1370 360 1500 255" dur="10s" repeatCount="indefinite"/></path>
<path d="M0 365 C130 310 210 405 320 350 S530 275 650 355 S860 410 980 330 S1240 260 1500 350" fill="none" stroke="#f0abfc" stroke-width="2.5" stroke-dasharray="8 14" opacity=".7"><animate attributeName="stroke-dashoffset" values="0;-220" dur="8s" repeatCount="indefinite"/></path>
<g transform="translate(1220 210)" filter="url(#glow)"><circle r="118" fill="url(#vinyl)" stroke="#67e8f9" stroke-opacity=".5" stroke-width="2"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/></circle><circle r="74" fill="none" stroke="#a78bfa" stroke-opacity=".3"/><circle r="43" fill="none" stroke="#67e8f9" stroke-opacity=".3"/><circle r="7" fill="#fde68a"/></g>
<g font-family="Segoe UI,Arial,sans-serif"><text x="105" y="120" fill="#a5f3fc" font-size="23" letter-spacing="7">KEVIN CUSNIR • LIRIOTHTELTANION</text><text x="100" y="230" fill="#fff" font-size="86" font-weight="900">NOVA MUSIC LAB</text><text x="106" y="286" fill="#ddd6fe" font-size="26" letter-spacing="2">YOUR LISTENING HISTORY AS A LIVING DIGITAL MUSEUM</text><text x="106" y="335" fill="#67e8f9" font-size="21" font-weight="650">LOCAL-FIRST ANALYTICS • MULTI-SOURCE IMPORT • EMOTIONAL MAPS • ARTIST IDENTITY<animate attributeName="opacity" values=".55;1;.55" dur="4s" repeatCount="indefinite"/></text></g>
<rect x="18" y="18" width="1464" height="424" rx="24" fill="none" stroke="#a5f3fc" stroke-opacity=".28" stroke-width="2"><animate attributeName="stroke-opacity" values=".15;.58;.15" dur="5.5s" repeatCount="indefinite"/></rect>
</svg>